<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="container">
            <h1>Sign Up Today!</h1>
            
             <form id="form" >
               
                 <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Full Name"
                    required minlength="3" maxlength="100">
                 </div>
                
                 <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number"
                    required pattern="^\+\d{7,15}$">
                 </div>
                 
                 <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Email Address"
                    required >
                 </div>
                 
                 <div class="form-group">
                    <label for="website">Website URL</label>
                    <input type="url" id="website" name="website" placeholder="Website URL"
                    required>
                 </div>
                
                 <div class="form-group">
                    <label for="password1">Password</label>
                    <input type="password" id="password1" placeholder="Create Password (Min 8  Characters)"
                    required pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$"
                    title="Please include at least one uppercase character, 1 lowercase character, and 1 number.">
                 </div>
                
                 <div class="form-group">
                    <label for="password2">Confirm Password</label>
                    <input type="password" id="password2" name="password" placeholder="Confirm Password"
                    required pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$" title="Please include at least one uppercase character, 1 lowercase character, and 1 number.">
                 </div>
                 <button type="submit">Register</button>
             </form>
            
              <div class="message-container">
                <h3 id="message">Don't Hesitate!</h3>
              </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
